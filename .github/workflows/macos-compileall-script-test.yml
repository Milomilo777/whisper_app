name: macOS compileall-whisper-mac.sh test

# Dedicated, manual-only workflow that exercises
# platform/macos/pyinstaller/compileall-whisper-mac.sh exactly as authored
# (rm -rf dist -> pyinstaller build -> create-dmg wrap) on a real macOS
# runner, separate from macos-app.yml's own build+dmg steps so a routine
# run of that workflow doesn't pay for a second full rebuild just to
# re-verify this script.
on:
  workflow_dispatch:

jobs:
  run-script:
    name: Run compileall-whisper-mac.sh (arm64)
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps (slim) + PyInstaller + create-dmg
        run: |
          python -m pip install --upgrade pip
          grep -viE '^stable-ts' requirements.txt > requirements.slim.txt
          pip install -r requirements.slim.txt
          pip install pyinstaller
          brew install create-dmg

      - name: Pin numpy to a Monterey/VM-safe 1.x
        run: pip install "numpy==1.26.4"

      - name: Provide macOS ffmpeg/ffprobe in bin/
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(brew --prefix)/bin/ffmpeg"  bin/ffmpeg
          cp "$(brew --prefix)/bin/ffprobe" bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe

      - name: Run the script itself
        run: bash platform/macos/pyinstaller/compileall-whisper-mac.sh

      - name: Verify the .dmg was produced
        run: |
          DMG="dist/Whisper Project.dmg"
          [ -f "$DMG" ] || { echo "ERROR: $DMG not found" >&2; exit 1; }
          ls -la "$DMG"
          file "$DMG"

      - name: Upload .app + .dmg
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: compileall-script-output
          path: |
            dist/*.app
            dist/*.dmg
          if-no-files-found: warn
