name: macOS app build

# Heavy build — MANUAL dispatch only (does not auto-run on push), so it never
# burns private-repo macOS minutes by accident. Builds the macOS distribution
# methods on a real Apple-silicon runner, smoke-launches the result, and uploads
# the .app/.dmg as a downloadable artifact.
on:
  workflow_dispatch:
  # Manual-only in practice: it fires solely on a push to the dedicated
  # `macos-app-build` branch (NOT on macos-ci), so a normal macos-ci push never
  # triggers this heavy build. To run it: push macos-ci's HEAD to macos-app-build.
  push:
    branches: [macos-app-build]

jobs:
  build-app:
    name: Build macOS .app/.dmg + smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15  # Apple Silicon
            arch: arm64
          # macos-13 (Ventura, Intel) instead of macos-15-intel: an older SDK
          # with broader back-compat, so the x86_64 build is more likely to
          # run on older/virtualised Intel Macs (e.g. Monterey 12) — see
          # MACOSX_DEPLOYMENT_TARGET below for the matching deployment target.
          - runner: macos-13  # Intel (Ventura) — so the .app runs on Monterey too
            arch: x86_64
    env:
      # secrets.* is not allowed in a step-level `if`, so surface it as a
      # job env var (this IS allowed) and gate the key-write step on env.
      GCLOUD_STT_KEY: ${{ secrets.GCLOUD_STT_KEY }}
      # Target Monterey (12.0) as the minimum runtime so wheels built here
      # (numpy, ctranslate2, etc.) and PyInstaller's bundled extensions don't
      # require a newer macOS than the user's machine provides. Applies to
      # both matrix legs; arm64 Macs all run far newer macOS anyway, so this
      # is a no-op there but harmless.
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4

      # Bundle the Google Cloud service-account key ONLY when the secret is
      # configured. The key is never committed (gitignored), so a normal
      # public-repo run has no secret and builds WITHOUT the key (safe — the
      # artifact is public). For the trusted final release build the
      # GCLOUD_STT_KEY secret is set, and this step writes creds/gcloud_stt.json
      # so the mac spec bundles it into the .app/.dmg.
      - name: Bundle Google Cloud key from secret (only when set)
        if: ${{ env.GCLOUD_STT_KEY != '' }}
        run: |
          mkdir -p creds
          printf '%s' "$GCLOUD_STT_KEY" > creds/gcloud_stt.json
          echo "wrote creds/gcloud_stt.json ($(wc -c < creds/gcloud_stt.json) bytes)"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps (slim — drop stable-ts/torch to match the shipped build) + PyInstaller
        run: |
          python -m pip install --upgrade pip
          grep -viE '^stable-ts' requirements.txt > requirements.slim.txt
          pip install -r requirements.slim.txt
          pip install pyinstaller

      # requirements.txt has no numpy pin (faster-whisper/ctranslate2 pull it
      # in transitively, currently numpy 2.x). numpy 2.x C-extensions built on
      # macos-15 (newer SDK + aggressive SIMD baseline) have been seen failing
      # to import on older/virtualised Intel Macs (e.g. Monterey 12, no AVX).
      # Force a conservative numpy 1.x AFTER the slim install so it overrides
      # the transitive 2.x resolution. ctranslate2 4.x and faster-whisper 1.x
      # both declare numpy>=1.21,<3, so 1.26.4 (last 1.x, Python 3.12-capable)
      # is compatible and closest to the known-good 1.24.3 from source/venv.
      - name: Pin numpy to a Monterey/VM-safe 1.x
        run: pip install "numpy==1.26.4"

      - name: Provide macOS ffmpeg/ffprobe in bin/
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(brew --prefix)/bin/ffmpeg"  bin/ffmpeg
          cp "$(brew --prefix)/bin/ffprobe" bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe
          file bin/ffmpeg
          ls -la bin

      # ---- Method 1: PyInstaller .app ----
      - name: "Method 1 - build .app (PyInstaller)"
        run: pyinstaller --noconfirm --clean platform/macos/pyinstaller/whisper_project_mac.spec

      - name: "Method 1 - REAL smoke: the frozen .app is a valid native bundle and boots"
        continue-on-error: true
        run: |
          set +e
          APP="dist/Whisper Project.app"
          BIN="$APP/Contents/MacOS/Whisper Project"
          [ -d "$APP" ] && echo "OK .app bundle present"
          [ -f "$APP/Contents/Info.plist" ] && echo "OK Info.plist present"
          [ -x "$BIN" ] && echo "OK launcher present"
          echo "--- file/arch ---"; file "$BIN"
          echo "--- boot smoke: 'transcribe --help' under a 60s hard timeout ---"
          "$BIN" transcribe --help & PID=$!
          ( sleep 60 && kill -9 $PID 2>/dev/null ) & WD=$!
          wait $PID; RC=$?
          kill -9 $WD 2>/dev/null
          echo "transcribe --help exit code: $RC (0 = the frozen app booted + imported on macOS)"

      # NON-continue-on-error: the step above is informational only (a bundle
      # can be malformed in other ways without us wanting to fail the whole
      # matrix leg), but a numpy import failure is exactly the bug this build
      # exists to prevent — it must fail the job loudly here, not silently
      # ship a broken .dmg. `transcribe --help` runs gui.py's CLI path, which
      # imports core.transcriber -> core.backends.faster_whisper_be ->
      # faster_whisper -> ctranslate2 -> numpy, so a nonzero exit here means
      # that chain (including numpy's C-extensions) failed to import in the
      # frozen bundle on THIS runner. As a second, independent signal, also
      # confirm numpy's compiled _multiarray_umath extension was actually
      # collected into the bundle (catches "PyInstaller silently dropped the
      # .so" even if the boot smoke above happens to still pass).
      - name: "Method 1 - numpy/faster-whisper import MUST succeed in the frozen .app"
        run: |
          set -e
          APP="dist/Whisper Project.app"
          BIN="$APP/Contents/MacOS/Whisper Project"
          echo "--- bundled numpy C-extension check ---"
          if find "$APP/Contents/MacOS" -iname '_multiarray_umath*' | grep -q .; then
            echo "OK numpy _multiarray_umath extension is bundled:"
            find "$APP/Contents/MacOS" -iname '_multiarray_umath*'
          else
            echo "ERROR: numpy's _multiarray_umath C-extension was not found in the bundle." >&2
            exit 1
          fi
          echo "--- boot smoke (hard requirement): 'transcribe --help' under a 60s timeout ---"
          "$BIN" transcribe --help & PID=$!
          ( sleep 60 && kill -9 $PID 2>/dev/null ) & WD=$!
          wait $PID; RC=$?
          kill -9 $WD 2>/dev/null
          echo "transcribe --help exit code: $RC"
          if [ "$RC" -ne 0 ]; then
            echo "ERROR: the frozen app failed to boot/import (numpy/faster-whisper chain)." >&2
            exit 1
          fi

      - name: "Method 1 - wrap into .dmg (create-dmg) + arch-suffix the name"
        continue-on-error: true
        run: |
          brew install create-dmg
          bash platform/macos/pyinstaller/builddmg.command
          # Tag the .dmg with its arch so the two matrix builds don't collide
          # and users can pick the right one (arm64 vs x86_64/Intel).
          if [ -f "dist/Whisper Project.dmg" ]; then
            mv "dist/Whisper Project.dmg" "dist/Whisper Project-${{ matrix.arch }}.dmg"
          fi

      # ---- Method 2: source-venv install.command ----
      - name: "Method 2 - run install.command (source venv -> .app)"
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          chmod +x platform/macos/install.command
          bash platform/macos/install.command
          echo "--- ~/Applications after install.command ---"
          ls -la "$HOME/Applications" 2>/dev/null || true

      # ---- Method 3: Homebrew formula ----
      - name: "Method 3 - lint the Homebrew formula"
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          brew audit --formula --strict platform/macos/homebrew/whisper-project.rb || true
          echo "NOTE: a real 'brew install' is blocked until the repo is PUBLIC and a release"
          echo "tarball with a real sha256 is published (the formula's sha256 is a placeholder)."

      - name: Upload build artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.arch }}
          path: |
            dist/*.app
            dist/*.dmg
          if-no-files-found: warn
