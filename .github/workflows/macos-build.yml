name: macOS build check

# Runs ONLY on the macos-ci branch (which does not match ci.yml's push triggers,
# so the Windows/Ubuntu matrix never fires here) plus manual dispatch. One lean
# macOS runner — private-repo macOS minutes bill at 10x, so keep it minimal.
#
# This first pass is a DIAGNOSTIC run: every step uses continue-on-error so a
# single run surfaces ALL macOS-specific problems at once (which deps fail to
# install, pyright result, which tests fail) instead of stopping at the first.
on:
  workflow_dispatch:
  push:
    branches: [macos-ci]

jobs:
  macos-deps:
    name: macOS ${{ matrix.os }} · Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]            # Apple Silicon (arm64). Add macos-15-intel later if needed.
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Toolchain
        run: |
          python --version
          python -c "import sys, tkinter; print('Tk', tkinter.TkVersion)"
          uname -m
          sysctl -n machdep.cpu.brand_string || true

      - name: Install runtime deps
        id: deps
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev tools
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: pip install pytest pytest-cov pyright responses

      - name: pip check + freeze
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          pip check || true
          pip freeze

      - name: Import smoke (core + app)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          python -c "import core; print('core version', core.__version__)"
          python -c "import app; print('app import OK')"

      - name: Pyright (static type-check)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: python -m pyright app core

      - name: Pytest (hermetic unit suite, no smoke)
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          WHISPER_OFFLINE_TESTS: "1"
        run: python -m pytest tests/ --ignore=tests/smoke -v
