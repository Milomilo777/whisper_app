name: CI

# Run on every push to any branch + every PR. The matrix targets
# Windows because that is what we ship; Ubuntu is a sanity check
# for the pure-Python core (download / writers / smtv / paths).
#
# The compiled-exe smoke tests under tests/smoke/ are intentionally
# excluded from CI — they need the 3 GB Whisper model + a real
# video file + a built PyInstaller exe. CI only runs the hermetic
# unit suite (tests/ minus tests/smoke/).

on:
  push:
    branches: [master, "release/**", "feature/**", "chore/**"]
  pull_request:
    branches: [master, "release/**", "chore/**"]

jobs:
  unit-tests:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is the primary ship target. Ubuntu is a portable-
        # core sanity check (no tkinter UI, the smoke tests skip).
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Dev tools used by the unit suite. `responses` is needed
          # by tests/core/test_model_manager.py to mock the CDN
          # download responses; pyproject.toml lists it under the
          # `dev` extra, install explicitly here so the CI install
          # step is self-documenting.
          pip install pytest pytest-cov pyright responses

      # Ubuntu apt-python3 doesn't ship tkinter by default; the
      # Tk-touching unit tests (after-callback cancellation, the
      # transcript viewer) need both tkinter and a virtual display
      # (xvfb-run). Windows runners have the full stack already.
      - name: Install tkinter + xvfb on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb

      - name: Pyright (static type-check)
        run: python -m pyright app core
        continue-on-error: false

      - name: Pytest (unit suite, no smoke) — Windows
        if: runner.os == 'Windows'
        env:
          # Make sure the live SMTV smokes skip — CI is offline-only
          # from our test harness's point of view.
          WHISPER_OFFLINE_TESTS: "1"
        run: python -m pytest tests/ --ignore=tests/smoke -v

      - name: Pytest (unit suite, no smoke) — Linux via xvfb
        if: runner.os == 'Linux'
        env:
          WHISPER_OFFLINE_TESTS: "1"
        run: xvfb-run -a python -m pytest tests/ --ignore=tests/smoke -v

      - name: Coverage report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        env:
          WHISPER_OFFLINE_TESTS: "1"
        run: |
          xvfb-run -a python -m pytest tests/ --ignore=tests/smoke --cov=app --cov=core --cov-report=term --cov-report=xml
      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      # Repo is activated on codecov.io (owner signed in 2026-07-04) and
      # CODECOV_TOKEN is set as a repo secret -- token-based upload is more
      # reliable than the tokenless flow (no rate-limiting). continue-on-error
      # so a codecov-side hiccup never fails CI itself.
      - name: Upload coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
